name: Verificação do site

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Verificar arquivos principais
        run: |
          test -f index.html
          test -f style.css
          test -f script.js

      - name: Conferir referências principais
        run: |
          grep -q "style.css" index.html
          grep -q "script.js" index.html
          grep -q "Danilo A. de Lima" index.html
